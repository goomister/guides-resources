{{- $url := urls.Parse .Destination -}}
{{- $scheme := $url.Scheme -}}

<a href="
{{- if eq $scheme "" -}}
    {{- /* Extract the fragment (hash) if it exists */ -}}
    {{- $fragment := $url.Fragment -}}

    {{- /* Strip the .md extension from the main path if present */ -}}
    {{- $cleanPath := strings.TrimSuffix ".md" $url.Path -}}
    {{- $cleanPath := strings.TrimSuffix "/index" $cleanPath -}}
    {{- $cleanPath := strings.TrimPrefix "../" $cleanPath -}}

    {{- /* If there is a hash fragment, slugify/lowercase the entire path string */ -}}
    {{- if ne $fragment "" -}}
        {{- $cleanPath = $cleanPath | urls.URLize -}}
        {{- $fragment = $fragment | urls.URLize -}}
        {{- /* Rebuild the link using Hugo's relref logic */ -}}
        {{- relref .Page (printf "%s#%s" $cleanPath $fragment) | safeURL -}}
    {{- else -}}
        {{- /* No hash fragment: handle standard relative markdown links */ -}}
        {{- if strings.HasSuffix $url.Path ".md" -}}
            {{- relref .Page $cleanPath | safeURL -}}
        {{- else -}}
            {{- .Destination | safeURL -}}
        {{- end -}}
    {{- end -}}
{{- else -}}
    {{- .Destination | safeURL -}}
{{- end -}}"
{{- with .Title }} title="{{ . | safeHTML }}"{{- end -}}>
{{- .Text | safeHTML -}}
</a>
{{- /* whitespace stripped here to avoid trailing newline in rendered result caused by file EOL */ -}}
